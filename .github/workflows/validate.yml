name: Validate Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate extension.json is valid JSON
        run: |
          echo "Checking extension.json..."
          python3 -c "
          import json, sys
          with open('ModusOp Dock.novaextension/extension.json') as f:
              data = json.load(f)
          required = ['identifier', 'name', 'version', 'main']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'Missing required fields: {missing}', file=sys.stderr)
              sys.exit(1)
          print(f'Valid: {data[\"name\"]} v{data[\"version\"]} ({data[\"identifier\"]})')
          "

      - name: Check required files exist
        run: |
          for f in \
            "ModusOp Dock.novaextension/extension.json" \
            "ModusOp Dock.novaextension/Scripts/main.js" \
            "LICENSE" \
            "README.md"; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f" >&2
              exit 1
            fi
          done
          echo "All required files present."
